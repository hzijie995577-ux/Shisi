<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>秒手 Ozon 自动采集插件</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: #0f172a;
        background: #f6f8fb;
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }
      .card {
        border: 1px solid #dbe3ef;
        border-radius: 10px;
        background: #fff;
        padding: 32px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }
      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.15;
      }
      p { color: #475569; }
      .download {
        display: inline-block;
        margin-top: 18px;
        border-radius: 8px;
        background: #155eef;
        color: #fff;
        padding: 13px 20px;
        text-decoration: none;
        font-weight: 700;
      }
      .steps {
        margin-top: 24px;
        padding: 20px;
        border-radius: 8px;
        background: #f8fafc;
      }
      code {
        border-radius: 6px;
        background: #eef2f7;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p><strong>Miaoshou Ozon Seerfar Collector</strong></p>
        <h1>秒手 Ozon 自动采集插件</h1>
        <p>当前版本 v0.1.5，包含稳定后台采集、授权码单机绑定、价格区间筛选、自动翻页和秒手采集箱推送。</p>
        <a class="download" href="./miaoshou-ozon/miaoshou_ozon_seerfar_extension.crx">下载正式安装包</a>
      </section>
      <section class="steps">
        <h2>安装说明</h2>
        <ol>
          <li>下载正式安装包。</li>
          <li>安装后打开插件，输入授权码。</li>
          <li>填写秒手 API 信息后开始使用。</li>
        </ol>
        <p>如果浏览器拦截第三方 CRX，请联系卖家处理安装策略。</p>
      </section>
    </main>
  </body>
</html>
